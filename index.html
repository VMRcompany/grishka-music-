        const translations = {

                            ${theme === 'dark' ? h`<${Sun} className="w-5 h-5 md:w-6 md:h-6" strokeWidth=${2.5} />` : h`<${Moon} className="w-5 h-5 md:w-6 md:h-6" strokeWidth=${2.5} />`}
                        </button>
                        <button onClick=${onOpenSettings} className=${`p-2 md:p-2.5 rounded-full transition-all ${theme === 'dark' ? 'text-gray-400 hover:text-white hover:bg-white/5' : 'text-gray-600 hover:text-blue-600 hover:bg-gray-100'}`}>

                        ` : h`

        const Player = ({ currentSong, isPlaying, onTogglePlay, onDownload, onNext, onBack, repeatMode, onToggleRepeat, isShuffle, onToggleShuffle, audioRef, theme }) => {
            const [currentTime, setCurrentTime] = useState(0);
            const [duration, setDuration] = useState(0);
            const [isFullScreen, setIsFullScreen] = useState(false);
            const [volume, setVolume] = useState(80);
            const [isMuted, setIsMuted] = useState(false);
            const [prevVolume, setPrevVolume] = useState(80);
            const [playerMode, setPlayerMode] = useState('audio'); // 'audio' or 'video'
            const videoRef = useRef(null);
            const t = translations[getCookie('gm_lang') || 'ru'];

            useEffect(() => {
                const audio = audioRef.current;
                if (!audio) return;
                const updateProgress = () => { 
                    setCurrentTime(audio.currentTime); 
                    setDuration(audio.duration || currentSong?.durationSec || 0); 
                    if (videoRef.current) videoRef.current.currentTime = audio.currentTime;
                };
                audio.addEventListener('timeupdate', updateProgress);
                audio.addEventListener('loadedmetadata', updateProgress);
                return () => { audio.removeEventListener('timeupdate', updateProgress); audio.removeEventListener('loadedmetadata', updateProgress); };
            }, [audioRef, currentSong]);

            useEffect(() => {
                if (videoRef.current) {
                    if (isPlaying && playerMode === 'video') videoRef.current.play().catch(() => {});
                    else videoRef.current.pause();
                }
            }, [isPlaying, playerMode]);

            const handleProgressChange = (e) => { if (audioRef.current) { const newTime = parseFloat(e.target.value); audioRef.current.currentTime = newTime; setCurrentTime(newTime); } };
            const toggleMute = () => { if (audioRef.current) { if (isMuted) { const restoreVol = prevVolume === 0 ? 80 : prevVolume; audioRef.current.volume = restoreVol / 100; setVolume(restoreVol); setIsMuted(false); } else { setPrevVolume(volume); audioRef.current.volume = 0; setVolume(0); setIsMuted(true); } } };
            const handleVolumeChange = (e) => { const val = parseInt(e.target.value); setVolume(val); if (audioRef.current) { audioRef.current.volume = val / 100; setIsMuted(val === 0); } };
            const formatTime = (time) => { if (isNaN(time)) return "0:00"; const mins = Math.floor(time / 60); const secs = Math.floor(time % 60); return `${mins}:${secs.toString().padStart(2, '0')}`; };

            const handleShare = async (e) => {
                e.stopPropagation();
                const shareUrl = `${window.location.origin}/${currentSong.slug}`;

                    try {
                        await navigator.share({ title: currentSong.title, text: `Listening to ${currentSong.title} by ${currentSong.artist} on Grishka Music!`, url: shareUrl });

                    alert(t.copied);

            if (!currentSong) return null;

                                </div>
                                <span className=${`text-[10px] font-bold ${theme === 'dark' ? 'text-gray-500' : 'text-gray-400'} w-10 text-right md:hidden`}>${formatTime(duration)}</span>
                            </div>
                        </div>

                            </div>
                            <div className=${isFullScreen ? 'text-center mt-6 w-full flex flex-col items-center gap-2' : 'overflow-hidden flex-1'}>

                                </div>

            // Basic transliteration for common Cyrillic characters
            const cyrillicToLatin = {
                'а': 'a', 'б': 'b', 'в': 'v', 'г': 'g', 'д': 'd', 'е': 'e', 'ё': 'yo', 'ж': 'zh', 'з': 'z', 'и': 'i', 'й': 'y', 'к': 'k', 'л': 'l', 'м': 'm', 'н': 'n', 'о': 'o', 'п': 'p', 'р': 'r', 'с': 's', 'т': 't', 'у': 'u', 'ф': 'f', 'х': 'h', 'ц': 'ts', 'ч': 'ch', 'ш': 'sh', 'щ': 'sch', 'ъ': '', 'ы': 'y', 'ь': '', 'э': 'e', 'ю': 'yu', 'я': 'ya'
            };
            slug = slug.split('').map(char => cyrillicToLatin[char] || char).join('');
            
            let finalSlug = slug;
            let counter = 1;
            let isUnique = false;
            
            while (!isUnique) {
                const q = query(collection(db, collectionName), where('slug', '==', finalSlug));
                const snapshot = await getDocs(q);
                if (snapshot.empty) {
                    isUnique = true;
                } else {
                    finalSlug = `${slug}-${Math.floor(Math.random() * 10000)}`;
                }
            }
            return finalSlug;
        };

                recognition.start();
            };

            const simulateMusicAnalysis = () => { setTimeout(() => { onSearchResult("Phonk"); onClose(); }, 3000); };

            return h`
                <div className="fixed inset-0 z-[300] bg-black/95 backdrop-blur-3xl flex flex-col items-center justify-center p-8 transition-all">
                    <button onClick=${onClose} className="absolute top-8 right-8 p-4 bg-white/5 rounded-full text-white"><${X} size=${32} /></button>
                    <div className="flex flex-col items-center gap-16 max-w-lg w-full">
                        <h2 className="text-white text-3xl font-black uppercase tracking-[0.2em] animate-pulse text-center">${mode === 'voice' ? t.listening : t.analyzing}</h2>
                        <div className="relative flex items-center justify-center w-full">
                            <div className=${`w-36 h-36 rounded-full flex items-center justify-center shadow-[0_0_50px_rgba(37,99,235,0.3)] ${mode === 'voice' ? 'bg-blue-600' : 'bg-purple-600'}`}>
                                ${mode === 'voice' ? h`<${Mic} size=${56} className="text-white" />` : h`<${Music} size=${56} className="text-white" />`}
                            </div>
                        </div>
                        <button onClick=${() => setMode(mode === 'voice' ? 'music' : 'voice')} className=${`px-10 py-5 rounded-2xl font-black text-xs uppercase tracking-[0.3em] border-2 flex items-center gap-3 ${mode === 'voice' ? 'border-purple-500 text-purple-400' : 'border-blue-500 text-blue-400'}`}>
                            ${mode === 'voice' ? h`<${Music} size=${16} />` : h`<${Mic} size=${16} />`} ${mode === 'voice' ? t.searchByMusic : t.searchByVoice}
                        </button>
                    </div>
                </div>
            `;
        };

        const MobileNav = ({ t, activeTab, setActiveTab, onOpenSettings, theme }) => {
            const textColor = (id) => activeTab === id ? (theme === 'dark' ? 'text-white' : 'text-blue-600') : 'text-gray-500';
            return h`
                <div className=${`md:hidden fixed bottom-0 left-0 right-0 h-20 ${theme === 'dark' ? 'bg-[#000000]/95' : 'bg-white/95 shadow-[0_-5px_20px_rgba(0,0,0,0.05)]'} backdrop-blur-xl border-t ${theme === 'dark' ? 'border-white/10' : 'border-gray-100'} flex items-center justify-around px-6 z-[90] pb-safe`}>
                    <button onClick=${() => setActiveTab('home')} className=${`flex flex-col items-center gap-1.5 ${textColor('home')}`}><${Home} size=${22} /><span className="text-[10px] font-black uppercase">${t.home}</span></button>
                    <button onClick=${() => setActiveTab('explore')} className=${`flex flex-col items-center gap-1.5 ${textColor('explore')}`}><${Compass} size=${22} /><span className="text-[10px] font-black uppercase">${t.explore}</span></button>
                    <button onClick=${() => setActiveTab('library')} className=${`flex flex-col items-center gap-1.5 ${textColor('library')}`}><${Library} size=${22} /><span className="text-[10px] font-black uppercase">${t.library}</span></button>
                    <button onClick=${onOpenSettings} className=${`flex flex-col items-center gap-1.5 ${textColor('settings')}`}><${SettingsIcon} size=${22} /><span className="text-[10px] font-black uppercase">${t.settings}</span></button>
                </div>
            `;
        };

        // --- Main App ---

        // --- Error Boundary ---
        class ErrorBoundary extends React.Component {
            constructor(props) { super(props); this.state = { hasError: false, error: null }; }
            static getDerivedStateFromError(error) { return { hasError: true, error }; }
            render() {
                if (this.state.hasError) {
                    return h`
                        <div className="flex flex-col items-center justify-center min-h-screen bg-[#030303] text-white p-8 text-center">
                            <${AlertTriangle} size=${64} className="text-red-500 mb-6" />
                            <h1 className="text-3xl font-black mb-4 uppercase tracking-tight">Что-то пошло не так</h1>
                            <p className="text-gray-400 mb-8 max-w-md font-bold">Произошла ошибка в приложении. Пожалуйста, перезагрузите страницу или попробуйте позже.</p>
                            <button onClick=${() => window.location.reload()} className="px-8 py-3 bg-blue-600 rounded-full font-black uppercase tracking-widest text-xs">Перезагрузить</button>
                        </div>
                    `;
                }
                return this.props.children;
            }
        }

        // --- Firebase Connection Test ---
        async function testConnection() {
            if (!db) return;
            try {
                await getDoc(doc(db, 'test', 'connection'));
            } catch (error) {
                if (error instanceof Error && error.message.includes('the client is offline')) {
                    console.error("Please check your Firebase configuration. The client is offline.");
                }
            }
        }

        const App = () => {
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('home');
            const [language, setLanguage] = useState(() => getCookie('gm_lang') || 'ru');
            const [theme, setTheme] = useState(() => getCookie('gm_theme') || 'dark');
            const [isSettingsOpen, setIsSettingsOpen] = useState(false);
            const [isUploadOpen, setIsUploadOpen] = useState(false);
            const [isCreatePlaylistOpen, setIsCreatePlaylistOpen] = useState(false);
            const [songToAddToPlaylist, setSongToAddToPlaylist] = useState(null);
            const [isVoiceSearchOpen, setIsVoiceSearchOpen] = useState(false);
            const [searchQuery, setSearchQuery] = useState('');
            const [results, setResults] = useState([]);
            const [globalMusic, setGlobalMusic] = useState([]);
            const [playlists, setPlaylists] = useState([]);
            const [favorites, setFavorites] = useState([]);
            const [currentSong, setCurrentSong] = useState(null);
            const [isPlaying, setIsPlaying] = useState(false);
            const [repeatMode, setRepeatMode] = useState('none');
            const [isShuffle, setIsShuffle] = useState(false);
            const audioRef = useRef(null);
            const t = translations[language];

            useEffect(() => {
                const checkSlug = async () => {
                    const path = window.location.pathname.substring(1);
                    if (path && !['home', 'explore', 'library', 'search', 'favorites'].includes(path)) {
                        // Check if it's a song slug
                        const qSong = query(collection(db, 'songs'), where('slug', '==', path));
                        const songSnap = await getDocs(qSong);
                        if (!songSnap.empty) {
                            const song = { id: songSnap.docs[0].id, ...songSnap.docs[0].data() };
                            handlePlaySong(song);
                            return;
                        }

                        // Check if it's a playlist slug
                        const qPlaylist = query(collection(db, 'playlists'), where('slug', '==', path), where('isPublic', '==', true));
                        const playlistSnap = await getDocs(qPlaylist);
                        if (!playlistSnap.empty) {
                            const playlist = { id: playlistSnap.docs[0].id, ...playlistSnap.docs[0].data() };
                            setActiveTab(`playlist-${playlist.id}`);
                        }
                    }
                };
                if (db) checkSlug();
            }, [db]);

            useEffect(() => {
                const unsubscribe = onAuthStateChanged(auth, (u) => { setUser(u); });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                const q = query(collection(db, 'songs'), orderBy('createdAt', 'desc'));
                const unsubscribe = onSnapshot(q, (snapshot) => {
                    const music = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setGlobalMusic(music);
                }, (err) => handleFirestoreError(err, OperationType.GET, 'songs'));
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) { setPlaylists([]); setFavorites([]); return; }
                const qPlaylists = query(collection(db, 'playlists'), where('authorId', '==', user.uid));
                const unsubPlaylists = onSnapshot(qPlaylists, (snapshot) => {
                    setPlaylists(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                }, (err) => handleFirestoreError(err, OperationType.GET, 'playlists'));
                const qFavorites = query(collection(db, 'favorites'), where('userId', '==', user.uid));
                const unsubFavorites = onSnapshot(qFavorites, (snapshot) => {
                    setFavorites(snapshot.docs.map(doc => doc.data().songId));
                }, (err) => handleFirestoreError(err, OperationType.GET, 'favorites'));
                return () => { unsubPlaylists(); unsubFavorites(); };
            }, [user]);

            useEffect(() => { setCookie('gm_theme', theme, 30); setCookie('gm_lang', language, 30); document.body.style.backgroundColor = theme === 'dark' ? '#030303' : '#ffffff'; }, [theme, language]);

            const handleLogin = async () => { try { await signInWithPopup(auth, new GoogleAuthProvider()); } catch (err) { alert("Login failed: " + err.message); } };
            const handleLogout = async () => { try { await signOut(auth); } catch (err) { alert("Logout failed: " + err.message); } };

            const handleToggleFavorite = async (song) => {
                if (!user) { alert("Please login to favorite songs"); return; }
                const favId = `${user.uid}_${song.id}`;
                const favRef = doc(db, 'favorites', favId);
                const songRef = doc(db, 'songs', song.id);
                try {
                    await runTransaction(db, async (transaction) => {
                        const favDoc = await transaction.get(favRef);
                        if (favDoc.exists()) {
                            transaction.delete(favRef);
                            transaction.update(songRef, { favoritesCount: increment(-1) });
                        } else {
                            transaction.set(favRef, { userId: user.uid, songId: song.id, createdAt: serverTimestamp() });
                            transaction.update(songRef, { favoritesCount: increment(1) });
                        }
                    });
                } catch (err) { handleFirestoreError(err, OperationType.WRITE, 'favorites/songs'); }
            };

            const handleDeleteSong = async (song) => {
                if (!user || song.authorId !== user.uid) return;
                if (!confirm("Are you sure you want to delete this song?")) return;
                try {
                    // Delete from Firestore
                    await deleteDoc(doc(db, 'songs', song.id));
                    
                    // Delete from Storage
                    if (song.audioPath) {
                        const audioStorageRef = ref(storage, song.audioPath);
                        await deleteObject(audioStorageRef).catch(e => console.error("Audio delete failed:", e));
                    }
                    if (song.coverPath) {
                        const coverStorageRef = ref(storage, song.coverPath);
                        await deleteObject(coverStorageRef).catch(e => console.error("Cover delete failed:", e));
                    }

                    if (currentSong?.id === song.id) { setCurrentSong(null); setIsPlaying(false); }
                } catch (err) { 
                    handleFirestoreError(err, OperationType.DELETE, `songs/${song.id}`);
                    alert("Delete failed: " + err.message); 
                }
            };

            const handleCreatePlaylist = async (playlistData) => {
                if (!user) return;
                try {
                    await addDoc(collection(db, 'playlists'), {
                        name: playlistData.name,
                        icon: playlistData.icon || null,
                        isPublic: playlistData.isPublic,
                        slug: playlistData.slug,
                        authorId: user.uid,
                        songIds: [],
                        createdAt: serverTimestamp()
                    });
                    setIsCreatePlaylistOpen(false);
                } catch (err) { 
                    handleFirestoreError(err, OperationType.CREATE, 'playlists');
                    alert("Playlist creation failed: " + err.message); 
                }
            };

            const handleAddSongToPlaylist = async (playlistId, songId) => {
                try {
                    await updateDoc(doc(db, 'playlists', playlistId), {
                        songIds: arrayUnion(songId)
                    });
                    setSongToAddToPlaylist(null);
                } catch (err) { 
                    handleFirestoreError(err, OperationType.UPDATE, `playlists/${playlistId}`);
                    alert("Failed to add song: " + err.message); 
                }
            };

            const handleRemoveSongFromPlaylist = async (playlistId, songId) => {
                try {
                    await updateDoc(doc(db, 'playlists', playlistId), {
                        songIds: arrayRemove(songId)
                    });
                } catch (err) { 
                    handleFirestoreError(err, OperationType.UPDATE, `playlists/${playlistId}`);
                    alert("Failed to remove song: " + err.message); 
                }
            };

            const handleSearch = (query) => {
                setSearchQuery(query);
                if (!query.trim()) { setResults([]); if (activeTab === 'search') setActiveTab('home'); return; }
                if (activeTab !== 'search') setActiveTab('search');
                const lower = query.toLowerCase();
                setResults(globalMusic.filter(s => s.title.toLowerCase().includes(lower) || s.artist.toLowerCase().includes(lower)));
            };

            const handlePlaySong = (song) => {
                if (song.type === 'photo') {
                    setCurrentSong(song);
                    setIsPlaying(false);
                    if (audioRef.current) audioRef.current.src = '';
                    setIsFullScreen(true);
                    return;
                }
                if (currentSong?.id === song.id && currentSong.type !== 'photo') { 
                    if (isPlaying) audioRef.current.pause(); 
                    else audioRef.current.play().catch(e => console.error("Play failed:", e)); 
                    setIsPlaying(!isPlaying); 
                }
                else { 
                    setCurrentSong(song); 
                    setIsPlaying(true); 
                    if (audioRef.current) { 
                        audioRef.current.src = song.audioUrl || ''; 
                        if (song.audioUrl) audioRef.current.play().catch(e => console.error("Play failed:", e)); 
                    } 
                    if (song.type === 'video') setPlayerMode('video');
                    else setPlayerMode('audio');
                }
            };

            const handleDownload = (song) => { const a = document.createElement('a'); a.href = song.audioUrl; a.download = `${song.artist} - ${song.title}.mp3`; a.click(); };
            const playNext = useCallback(() => {
                const queue = activeTab === 'search' ? results : globalMusic;
                if (!currentSong || queue.length === 0) return;
                const idx = isShuffle ? Math.floor(Math.random() * queue.length) : (queue.findIndex(s => s.id === currentSong.id) + 1) % queue.length;
                handlePlaySong(queue[idx]);
            }, [currentSong, isShuffle, activeTab, results, globalMusic]);

            const playPrevious = useCallback(() => {
                const queue = globalMusic;
                const idx = (queue.findIndex(s => s.id === currentSong.id) - 1 + queue.length) % queue.length;
                handlePlaySong(queue[idx]);
            }, [currentSong, globalMusic]);

            useEffect(() => {
                const audio = audioRef.current; if (!audio) return;
                const handleEnded = () => { if (repeatMode === 'one') { audio.currentTime = 0; audio.play(); } else playNext(); };
                audio.addEventListener('ended', handleEnded); return () => audio.removeEventListener('ended', handleEnded);
            }, [repeatMode, playNext]);

            const renderSongsGrid = (songs, isInPlaylist = false, playlistId = null) => h`
                <div className="grid grid-cols-1 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-2 md:gap-5">
                    ${songs.map(song => h`<${MusicCard} key=${song.id} song=${song} onPlay=${handlePlaySong} onDownload=${handleDownload} onAddToPlaylist=${setSongToAddToPlaylist} onToggleFavorite=${handleToggleFavorite} onDelete=${handleDeleteSong} onRemoveFromPlaylist=${() => handleRemoveSongFromPlaylist(playlistId, song.id)} isFavorite=${favorites.includes(song.id)} user=${user} theme=${theme} isInPlaylist=${isInPlaylist} />`)}
                </div>
            `;

            const handleSharePlaylist = async (playlist) => {
                const shareUrl = `${window.location.origin}/${playlist.slug || playlist.id}`;
                if (navigator.share) {
                    try {
                        await navigator.share({ title: playlist.name, url: shareUrl });
                    } catch (err) { console.error("Share failed:", err); }
                } else {
                    navigator.clipboard.writeText(shareUrl);
                    alert(t.copied);
                }
            };

            const [feedType, setFeedType] = useState('music'); // 'music', 'video', 'photo'

            const renderContent = () => {
                if (activeTab.startsWith('playlist-')) {
                    const pId = activeTab.replace('playlist-', '');
                    const p = playlists.find(pl => pl.id === pId);
                    if (!p) return null;
                    const playlistSongs = globalMusic.filter(s => p.songIds.includes(s.id));
                    return h`
                        <div className="space-y-8">
                            <div className="flex flex-col md:flex-row items-center gap-8">
                                <div className=${`w-40 h-40 md:w-56 md:h-56 rounded-[40px] flex items-center justify-center ${theme === 'dark' ? 'bg-white/5' : 'bg-gray-100'}`}>
                                    ${p.icon ? h`<img src=${p.icon} className="w-full h-full object-cover rounded-[40px]" />` : h`<${ListMusic} size=${80} className="text-blue-500" />`}
                                </div>
                                <div className="text-center md:text-left space-y-2 flex-1">
                                    <div className="flex items-center justify-between">
                                        <button onClick=${() => setActiveTab('explore')} className="flex items-center gap-2 text-xs font-black text-blue-500 uppercase tracking-widest"><${ArrowLeft} size=${14} /> ${t.explore}</button>
                                        <button onClick=${() => handleSharePlaylist(p)} className="p-3 bg-white/5 rounded-full hover:bg-white/10 transition-colors"><${Share2} size=${20} /></button>
                                    </div>
                                    <h2 className="text-3xl md:text-6xl font-black uppercase tracking-tight">${p.name}</h2>
                                    <p className="text-gray-500 font-bold uppercase tracking-widest text-xs">${playlistSongs.length} ТРЕКОВ</p>
                                </div>
                            </div>
                            <div className="pt-6">${playlistSongs.length > 0 ? renderSongsGrid(playlistSongs, true, pId) : h`<div className="p-16 text-center border-2 border-dashed rounded-[40px]"><p className="text-gray-500 font-bold">${t.emptyLibrary}</p></div>`}</div>
                        </div>
                    `;
                }
                if (activeTab === 'favorites') {
                    const favoriteSongs = globalMusic.filter(s => favorites.includes(s.id));
                    return h`
                        <div className="space-y-8">
                            <h2 className="text-2xl md:text-4xl font-black mb-10 flex items-center gap-4"><${Heart} className="text-red-500" fill="currentColor" /> ${t.likedSongs}</h2>
                            ${favoriteSongs.length > 0 ? renderSongsGrid(favoriteSongs) : h`<div className="p-16 text-center border-2 border-dashed rounded-[40px]"><p className="text-gray-500 font-bold">${t.emptyLibrary}</p></div>`}
                        </div>
                    `;
                }
                if (activeTab === 'home') {
                    const filteredMusic = globalMusic.filter(s => {
                        if (feedType === 'music') return s.type === 'music' || !s.type;
                        if (feedType === 'video') return s.type === 'video';
                        if (feedType === 'photo') return s.type === 'photo';
                        return true;
                    });

                    return h`
                        <div className="space-y-10">
                            <div className="flex bg-white/5 p-1 rounded-2xl border border-white/5 max-w-md mx-auto md:mx-0">
                                ${['music', 'video', 'photo'].map(f_id => h`
                                    <button key=${f_id} onClick=${() => setFeedType(f_id)} className=${`flex-1 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all ${feedType === f_id ? 'bg-blue-600 text-white' : 'text-gray-500 hover:text-white'}`}>
                                        ${t[f_id === 'music' ? 'music' : (f_id === 'video' ? 'videos' : 'photos')]}
                                    </button>
                                `)}
                            </div>
                            <section>
                                <div className="flex items-center gap-2 mb-8">
                                    <${Sparkles} size=${20} className="text-blue-500" />
                                    <h2 className="text-lg md:text-2xl font-black uppercase tracking-tight">${t.newReleases}</h2>
                                </div>
                                ${filteredMusic.length === 0 ? h`<div className="py-16 text-center border-2 border-dashed rounded-3xl"><p className="text-gray-400 font-bold">${t.beFirst}</p></div>` : renderSongsGrid(filteredMusic)}
                            </section>
                        </div>
                    `;
                }
                if (activeTab === 'explore') return h`<div className="space-y-10"><section><h2 className="text-xl md:text-3xl font-black mb-8 uppercase tracking-tight">${t.playlists}</h2><div className="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6">${playlists.map(p => h`<div key=${p.id} className=${`p-5 rounded-[40px] cursor-pointer transition-all border group relative ${theme === 'dark' ? 'bg-white/5 border-white/5 hover:bg-white/10' : 'bg-white border-gray-100 hover:border-blue-500'}`} onClick=${() => setActiveTab(`playlist-${p.id}`)}><button onClick=${(e) => { e.stopPropagation(); handleSharePlaylist(p); }} className="absolute top-4 right-4 p-2 bg-black/40 text-white rounded-full opacity-0 group-hover:opacity-100 transition-opacity z-10"><${Share2} size=${16} /></button><div className="aspect-square rounded-3xl overflow-hidden mb-4 bg-black/20 flex items-center justify-center">${p.icon ? h`<img src=${p.icon} className="w-full h-full object-cover" />` : h`<${ListMusic} size=${40} className="text-blue-500" />`}</div><h3 className="font-bold text-lg truncate">${p.name}</h3><p className="text-xs font-bold text-gray-500 mt-1 uppercase tracking-widest">${p.songIds.length} треков</p></div>`)}<button onClick=${() => setIsCreatePlaylistOpen(true)} className="p-5 rounded-[40px] border-2 border-dashed flex flex-col items-center justify-center gap-3"><${Plus} size=${32} /><span className="font-black text-xs uppercase tracking-widest">${t.createPlaylist}</span></button></div></section></div>`;
                if (activeTab === 'library') {
                    const mySongs = globalMusic.filter(s => user && s.authorId === user.uid);
                    return h`
                        <div className="space-y-10">
                            <h2 className="text-2xl md:text-4xl font-black mb-10">${t.library}</h2>
                            <section>
                                <h3 className="text-xs md:text-xl font-black mb-6 uppercase tracking-widest text-blue-500 flex items-center gap-2"><${Music} className="w-5 h-5" /> ${t.myMusic}</h3>
                                ${mySongs.length > 0 ? renderSongsGrid(mySongs) : h`<div className="p-16 text-center text-gray-500 font-bold border-2 border-dashed rounded-[40px]">${t.emptyLibrary}</div>`}
                            </section>
                        </div>
                    `;
                }
                if (activeTab === 'search') return h`<div className="space-y-6"><h2 className="text-xl md:text-3xl font-black">${t.resultsFor} "${searchQuery}"</h2>${results.length > 0 ? renderSongsGrid(results) : h`<div className="flex flex-col items-center justify-center py-24 text-center"><${SearchX} size=${64} className="text-gray-500 mb-4 opacity-50" /><p className="text-xl font-bold text-gray-500">${t.noResults}</p></div>`}</div>`;
                return null;
            };

            return h`
                <div className=${`flex h-screen overflow-hidden ${theme === 'dark' ? 'bg-[#030303] text-white' : 'bg-white text-gray-900'}`}>
                    <audio ref=${audioRef} onPlay=${() => setIsPlaying(true)} onPause=${() => setIsPlaying(false)} />
                    <${Sidebar} t=${t} activeTab=${activeTab} setActiveTab=${setActiveTab} theme=${theme} playlists=${playlists} onCreatePlaylist=${() => setIsCreatePlaylistOpen(true)} />
                    <main className="flex-1 flex flex-col overflow-hidden relative">
                        <${Header} t=${t} language=${language} theme=${theme} user=${user} searchQuery=${searchQuery} setSearchQuery=${setSearchQuery} onSearch=${handleSearch} onOpenSettings=${() => setIsSettingsOpen(true)} onToggleTheme=${() => setTheme(prev => prev === 'dark' ? 'light' : 'dark')} onOpenVoiceSearch=${() => setIsVoiceSearchOpen(true)} onLogin=${handleLogin} onLogout=${handleLogout} />
                        <div className="flex-1 overflow-y-auto px-4 md:px-8 pb-72 md:pb-48">
                            <div className="py-6 md:py-8 flex items-center justify-between"><button onClick=${() => setIsUploadOpen(true)} className="flex items-center gap-2 px-6 py-2 bg-blue-600 text-white rounded-full text-xs font-black"><${Plus} size=${16} /> ${t.upload}</button></div>
                            ${renderContent()}
                        </div>
                        <${Player} currentSong=${currentSong} isPlaying=${isPlaying} onTogglePlay=${() => handlePlaySong(currentSong)} onDownload=${() => handleDownload(currentSong)} audioRef=${audioRef} onNext=${playNext} onBack=${playPrevious} repeatMode=${repeatMode} onToggleRepeat=${() => setRepeatMode(prev => prev === 'none' ? 'all' : prev === 'all' ? 'one' : 'none')} isShuffle=${isShuffle} onToggleShuffle=${() => setIsShuffle(!isShuffle)} theme=${theme} />
                        <${MobileNav} t=${t} activeTab=${activeTab} setActiveTab=${setActiveTab} onOpenSettings=${() => setIsSettingsOpen(true)} theme=${theme} />
                    </main>
                    ${isSettingsOpen && h`<${Settings} t=${t} theme=${theme} currentLang=${language} onClose=${() => setIsSettingsOpen(false)} onLanguageChange=${setLanguage} onThemeChange=${setTheme} />`}
                    ${isUploadOpen && h`<${UploadModal} t=${t} theme=${theme} user=${user} onClose=${() => setIsUploadOpen(false)} onUpload=${(s) => {}} />`}
                    ${isCreatePlaylistOpen && h`<${CreatePlaylistModal} t=${t} theme=${theme} onClose=${() => setIsCreatePlaylistOpen(false)} onCreate=${handleCreatePlaylist} />`}
                    ${songToAddToPlaylist && h`<${PlaylistSelectModal} song=${songToAddToPlaylist} playlists=${playlists} t=${t} theme=${theme} onClose=${() => setSongToAddToPlaylist(null)} onSelect=${(pid) => handleAddSongToPlaylist(pid, songToAddToPlaylist.id)} onCreateNew=${() => setIsCreatePlaylistOpen(true)} />`}
                    ${isVoiceSearchOpen && h`<${VoiceSearchOverlay} t=${t} theme=${theme} onClose=${() => setIsVoiceSearchOpen(false)} onSearchResult=${handleSearch} />`}
                </div>
            `;
        };

        // --- Initialization ---
        async function initApp() {
            const rootElement = document.getElementById('root');
            const renderError = (title, message, details = null) => {
                ReactDOM.createRoot(rootElement).render(h`
                    <div className="flex flex-col items-center justify-center min-h-screen bg-[#030303] text-white p-6 text-center">
                        <${AlertTriangle} size=${64} className="text-red-500 mb-6" />
                        <h1 className="text-2xl md:text-3xl font-black mb-4 uppercase tracking-tight">${title}</h1>
                        <p className="text-gray-400 mb-6 max-w-md font-bold">${message}</p>
                        ${details && h`
                            <div className="bg-white/5 p-6 rounded-3xl text-left mb-8 max-w-2xl w-full border border-white/10">
                                <h3 className="text-blue-500 font-black text-xs uppercase tracking-widest mb-4 flex items-center gap-2">
                                    <${Info} size=${14} /> Инструкция по исправлению:
                                </h3>
                                <div className="space-y-3 text-sm text-gray-300 font-medium">
                                    ${details.map((step, i) => h`<p key=${i} className="flex gap-3">
                                        <span className="text-blue-500 font-black">${i + 1}.</span> ${step}
                                    </p>`)}
                                </div>
                            </div>
                        `}
                        <button onClick=${() => window.location.reload()} className="px-10 py-4 bg-blue-600 hover:bg-blue-500 text-white rounded-full font-black uppercase tracking-widest text-xs transition-all shadow-xl shadow-blue-600/20">
                            Перезагрузить страницу
                        </button>
                    </div>
                `);
            };

            if (!firebaseConfig || !firebaseConfig.projectId) {
                renderError(
                    "Конфигурация не найдена",
                    "Пожалуйста, проверьте настройки Firebase в коде index.html.",
                    ["Убедитесь, что объект firebaseConfig заполнен корректными данными из консоли Firebase."]
                );
                return;
            }

            try {
                console.log("Initializing Firebase app...");
                const app = initializeApp(firebaseConfig);
                
                console.log("Initializing Firestore...");
                const useNamed = firebaseConfig.firestoreDatabaseId && 
                                firebaseConfig.firestoreDatabaseId !== '(default)' && 
                                firebaseConfig.firestoreDatabaseId !== '';
                
                const consoleUrl = `https://console.firebase.google.com/project/${firebaseConfig.projectId}/firestore`;
                const authSettingsUrl = `https://console.firebase.google.com/project/${firebaseConfig.projectId}/authentication/settings`;

                try {
                    if (useNamed) {
                        console.log(`Using named database: ${firebaseConfig.firestoreDatabaseId}`);
                        db = getFirestore(app, firebaseConfig.firestoreDatabaseId);
                    } else {
                        console.log("Using default database");
                        db = getFirestore(app);
                    }
                    
                    // Probe check to verify service availability
                    await getDoc(doc(db, '_internal_', 'probe')).catch(err => {
                        // If it's just a permission error or not found, it means the service IS available
                        if (err.code === 'permission-denied' || err.code === 'not-found') return;
                        // If it's a "database not found" error or "service not available", we should try the default one
                        if (err.message.includes('not found') || err.message.includes('not available') || err.message.includes('offline')) throw err;
                    });
                } catch (e) {
                    console.warn("Database initialization failed, trying fallback to (default)...", e.message);
                    try {
                        // Fallback to default if named failed
                        db = getFirestore(app);
                        await getDoc(doc(db, '_internal_', 'probe')).catch(err => {
                            if (err.code === 'permission-denied' || err.code === 'not-found') return;
                            throw err;
                        });
                    } catch (e2) {
                        const isVercel = window.location.hostname.includes('vercel.app');
                        const errorMsg = e2.message || String(e2);
                        const isConfigMismatch = errorMsg.includes('not found') || errorMsg.includes('not available');
                        
                        renderError(
                            "Firestore недоступен",
                            `Ошибка: ${errorMsg}`,
                            [
                                h`<b>Проект:</b> <span class="text-blue-400">${firebaseConfig.projectId}</span>`,
                                h`<b>База данных:</b> <span class="text-blue-400">${firebaseConfig.firestoreDatabaseId || '(default)'}</span>`,
                                h`<hr class="border-white/10 my-2" />`,
                                h`1. Перейдите в <a href="${consoleUrl}" target="_blank" class="text-blue-500 underline font-black">Firebase Console -> Firestore</a> и нажмите <b>"Create Database"</b>.`,
                                h`2. Убедитесь, что база данных с ID <b>${firebaseConfig.firestoreDatabaseId || '(default)'}</b> создана.`,
                                isVercel ? h`3. Перейдите в <a href="${authSettingsUrl}" target="_blank" class="text-blue-500 underline font-black">Auth -> Settings -> Authorized Domains</a> и добавьте <b>${window.location.hostname}</b>.` : "3. Если вы запускаете проект локально, проверьте интернет.",
                                h`4. Если вы используете свой проект, обновите <b>firebaseConfig</b> в коде index.html.`
                            ]
                        );
                        return;
                    }
                }

                auth = getAuth(app);
                storage = getStorage(app);
                
                // Gemini API Key Handling
                let apiKey = '{{GEMINI_API_KEY}}';
                if (apiKey.startsWith('{{')) {
                    const urlParams = new URLSearchParams(window.location.search);
                    apiKey = urlParams.get('gemini_key') || '';
                }
                ai = new GoogleGenAI({ apiKey: apiKey || 'dummy-key' });

                if (db && auth) {
                    ReactDOM.createRoot(rootElement).render(
                        h(ErrorBoundary, null, h(App))
                    );
                }
            } catch (error) {
                console.error("Initialization error:", error);
                renderError("Ошибка запуска", error.message);
            }
        }

        initApp();
    </script>
</body>
</html>
